name: Conda Package

on:
  push:

env:
  RATTLER_BUILD_VERSION: "0.31.1"

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install HDF5
        run: sudo apt-get update && sudo apt-get install -y libhdf5-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: test
        run: cargo test --all

  build:
    name: Build (${{ matrix.platform.target }})
    needs: test
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
            target: linux-64
          - os: macos-latest
            target: osx-arm64
          - os: windows-latest
            target: win-64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Compute version
        shell: bash
        run: |
          # v0.0.1-0-gabcdef  → 0.0.1       (exact tag)
          # v0.0.1-5-gabcdef  → 0.0.1.post5 (N commits after tag)
          RAW=$(git describe --tags --long --match 'v*' 2>/dev/null \
                || echo "v0.0.0-0-g$(git rev-parse --short HEAD)")
          TAG=$(echo "$RAW" | sed 's/^v//' | sed 's/-.*//')
          N=$(echo "$RAW"   | sed 's/[^-]*-//' | cut -d- -f1)
          if [ "$N" = "0" ]; then
            VERSION="$TAG"
          else
            VERSION="${TAG}.post${N}"
          fi
          echo "SCX_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building version: $VERSION"

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.5.0
        with:
          pixi-version: latest
          run-install: false

      - name: Install rattler-build
        run: |
          pixi global install rattler-build==${{ env.RATTLER_BUILD_VERSION }}

      - name: Build conda package
        shell: bash
        run: |
          rattler-build build --recipe conda.recipe/recipe.yaml \
            --output-dir rattler-output \
            --target-platform ${{ matrix.platform.target }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.platform.target }}
          path: rattler-output/
          retention-days: 7
          if-no-files-found: error

  publish:
    name: Publish to prefix.dev
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.5.0
        with:
          pixi-version: latest
          run-install: false

      - name: Install rattler-build
        run: |
          pixi global install rattler-build==${{ env.RATTLER_BUILD_VERSION }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Upload to prefix.dev (edge)
        run: |
          for pkg in $(find artifacts/ -type f \( -name "*.conda" -o -name "*.tar.bz2" \)); do
            echo "Uploading ${pkg}"
            if ! output=$(rattler-build upload prefix -c edge "${pkg}" 2>&1); then
              if echo "$output" | grep -q "409"; then
                echo "Already exists, skipping: ${pkg}"
              else
                echo "$output" && exit 1
              fi
            fi
          done

      - name: Upload to prefix.dev (stable, tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          for pkg in $(find artifacts/ -type f \( -name "*.conda" -o -name "*.tar.bz2" \)); do
            echo "Uploading ${pkg}"
            if ! output=$(rattler-build upload prefix -c almost-conductor "${pkg}" 2>&1); then
              if echo "$output" | grep -q "409"; then
                echo "Already exists, skipping: ${pkg}"
              else
                echo "$output" && exit 1
              fi
            fi
          done
