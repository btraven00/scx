name: Conda Package

on:
  push:

env:
  RATTLER_BUILD_VERSION: "0.31.1"

jobs:
  build:
    name: Build (${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
            target: linux-64
          - os: macos-latest
            target: osx-arm64
          - os: windows-latest
            target: win-64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true  # required for git describe to find version tags

      - name: Compute version
        shell: bash
        run: |
          # v0.0.1-0-gabcdef  → 0.0.1       (exact tag)
          # v0.0.1-5-gabcdef  → 0.0.1.post5 (N commits after tag)
          RAW=$(git describe --tags --long --match 'v*' 2>/dev/null \
                || echo "v0.0.0-0-g$(git rev-parse --short HEAD)")
          TAG=$(echo "$RAW" | sed 's/^v//' | sed 's/-.*//')
          N=$(echo "$RAW"   | sed 's/[^-]*-//' | cut -d- -f1)
          if [ "$N" = "0" ]; then
            VERSION="$TAG"
          else
            VERSION="${TAG}.post${N}"
          fi
          echo "SCX_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building version: $VERSION"

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.5.0
        with:
          pixi-version: latest
          run-install: false

      - name: Install rattler-build
        run: |
          pixi global install rattler-build==${{ env.RATTLER_BUILD_VERSION }}

      - name: Build conda package
        shell: bash
        run: |
          rattler-build build --recipe conda.recipe/recipe.yaml \
            --output-dir /tmp/rattler-output \
            --target-platform ${{ matrix.platform.target }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.platform.target }}
          path: /tmp/rattler-output/
          retention-days: 7
          if-no-files-found: error

  publish:
    name: Publish to prefix.dev
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.5.0
        with:
          pixi-version: latest
          run-install: false

      - name: Install rattler-build
        run: |
          pixi global install rattler-build==${{ env.RATTLER_BUILD_VERSION }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Upload to prefix.dev (edge)
        run: |
          for pkg in $(find artifacts/ -type f \( -name "*.conda" -o -name "*.tar.bz2" \)); do
            echo "Uploading ${pkg}"
            rattler-build upload prefix -c edge "${pkg}"
          done

      - name: Upload to prefix.dev (stable, tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          for pkg in $(find artifacts/ -type f \( -name "*.conda" -o -name "*.tar.bz2" \)); do
            echo "Uploading ${pkg}"
            rattler-build upload prefix -c almost-conductor "${pkg}"
          done
