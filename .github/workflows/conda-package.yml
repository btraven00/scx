name: Conda Package

on:
  push:

env:
  RATTLER_BUILD_VERSION: "0.31.1"

jobs:
  build:
    name: Build (${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
            target: linux-64
          - os: macos-13
            target: osx-64
          - os: macos-latest
            target: osx-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.5.0
        with:
          pixi-version: latest
          run-install: false

      - name: Install rattler-build
        run: |
          pixi global install rattler-build==${{ env.RATTLER_BUILD_VERSION }}

      - name: Build conda package
        run: |
          rattler-build build --recipe conda.recipe/recipe.yaml \
            --output-dir output \
            --target-platform ${{ matrix.platform.target }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.platform.target }}
          path: output/
          retention-days: 7
          if-no-files-found: error

  publish:
    name: Publish to prefix.dev
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.5.0
        with:
          pixi-version: latest
          run-install: false

      - name: Install rattler-build
        run: |
          pixi global install rattler-build==${{ env.RATTLER_BUILD_VERSION }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Upload to prefix.dev (edge)
        run: |
          for pkg in $(find artifacts/ -type f \( -name "*.conda" -o -name "*.tar.bz2" \)); do
            echo "Uploading ${pkg}"
            rattler-build upload prefix -c edge "${pkg}"
          done

      - name: Upload to prefix.dev (stable, tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          for pkg in $(find artifacts/ -type f \( -name "*.conda" -o -name "*.tar.bz2" \)); do
            echo "Uploading ${pkg}"
            rattler-build upload prefix -c almost-conductor "${pkg}"
          done
