[workspace]
name = "scx"
version = "0.1.0"
description = "Single-cell streaming interop engine"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

# ---------------------------------------------------------------------------
# Default environment — build tooling only, no R/Python overhead
# ---------------------------------------------------------------------------
[dependencies]
hdf5 = "*"
pkg-config = "*"

[tasks]
build         = { cmd = "cargo build",          description = "Build Rust workspace (debug)" }
build-release = { cmd = "cargo build --release", description = "Build Rust workspace (release)" }
test          = { cmd = "cargo test",            description = "Run Rust unit + integration tests" }
bench         = { cmd = "cargo bench",           description = "Run Criterion benchmarks" }

# ---------------------------------------------------------------------------
# test feature — R + Python oracle stack, only needed for integration testing
# ---------------------------------------------------------------------------
[feature.test.dependencies]
# R + Bioconductor
# Note: r-seuratdisk is excluded — broken on conda-forge (r-spatstat <2.0 dep).
# The reference H5AD is generated by reading H5Seurat directly with hdf5r.
r-base         = ">=4.4"
r-seurat       = ">=5"
r-jsonlite     = "*"
r-hdf5r        = "*"
r-matrix       = "*"
r-testthat     = "*"
bioconductor-anndatar = "*"
bioconductor-rhdf5    = "*"
# Python
python   = ">=3.14.3,<3.15"
anndata  = ">=0.12.10,<0.13"
h5py     = "*"
numpy    = "*"
scipy    = "*"
pytest   = "*"

[feature.test.tasks]
# --- fixture generation ---
prepare-scx-h5         = { cmd = "Rscript scripts/prepare_test_data.R",        description = "Generate PBMC 3k SCX-H5 golden fixture" }
prepare-h5seurat       = { cmd = "Rscript scripts/prepare_h5seurat_test.R",    description = "Generate PBMC 3k H5Seurat golden fixture", depends-on = ["prepare-scx-h5"] }
prepare-h5ad-ref       = { cmd = "Rscript scripts/prepare_h5ad_reference.R",   description = "Generate reference H5AD via anndataR (oracle)", depends-on = ["prepare-h5seurat"] }
fixtures               = { description = "Generate all golden test fixtures", depends-on = ["prepare-h5ad-ref"] }

# --- install scx binary into env ---
install-scx = { cmd = "cargo build --release && cp target/release/scx $CONDA_PREFIX/bin/scx", description = "Build scx and install to pixi env bin/", depends-on = ["build-release"] }

# --- conversion under test ---
convert-h5seurat-to-h5ad = { cmd = "cargo run --release --bin scx -- convert tests/golden/pbmc3k.h5seurat tests/golden/pbmc3k_scx.h5ad", description = "Run SCX conversion: H5Seurat → H5AD" }

# --- oracle verification ---
verify-python = { cmd = "pytest tests/python/ -v", description = "Run pytest integration suite (anndata oracle)" }
verify-r      = { cmd = "Rscript -e \"testthat::test_dir('tests/r', reporter = 'progress')\"", description = "Run testthat integration suite (anndataR oracle)" }

# --- full round-trip gate ---
roundtrip = { description = "Full round-trip: fixtures → convert → verify (Python + R oracles)", depends-on = ["fixtures", "convert-h5seurat-to-h5ad", "verify-python", "verify-r"] }


# ---------------------------------------------------------------------------
# Environments
# ---------------------------------------------------------------------------
[environments]
default = { features = [] }
test    = { features = ["test"] }
bpcells = { features = ["bpcells"] }

# ---------------------------------------------------------------------------
# bpcells feature — r-base 4.4 environment for BPCells fixture generation
# Kept separate because r-bpcells on conda-forge is pinned to r-base 4.4
# while the test environment requires r-base >=4.5 (bioconductor-anndatar).
# ---------------------------------------------------------------------------
[feature.bpcells.dependencies]
r-base     = ">=4.4,<4.5"
r-bpcells  = "*"
r-matrix   = "*"
r-jsonlite = "*"

[feature.bpcells.tasks]
prepare-bpcells = { cmd = "Rscript scripts/prepare_bpcells_fixtures.R", description = "Generate BPCells golden fixtures for compat tests" }
# Requires: bash scripts/download_large.sh (HLCA core h5ad, ~2 GB)
prepare-bpcells-h5seurat = { cmd = "Rscript scripts/prepare_bpcells_h5seurat.R", description = "Generate BPCells-packed H5Seurat fixture from HLCA core (large benchmark)" }
