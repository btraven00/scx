context:
  name: scx
  # SCX_VERSION is set by CI from `git describe`; fallback for local builds.
  version: ${{ env.SCX_VERSION | default("0.0.0.dev0") }}

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  path: ../

build:
  number: 0
  script:
    - if: unix
      then:
        - export HDF5_DIR="$PREFIX"
        - export CARGO_TARGET_DIR="/tmp/scx-build"
        - cargo install --path crates/scx-cli --root "$PREFIX" --locked
    - if: win
      then:
        - set "HDF5_DIR=%LIBRARY_PREFIX%"
        - set "CARGO_TARGET_DIR=%TEMP%\scx-build"
        - cargo install --path crates/scx-cli --root "%PREFIX%" --locked

requirements:
  build:
    - ${{ compiler('rust') }}
    - if: unix
      then: pkg-config
  host:
    - hdf5 1.12.*
  run:
    - hdf5 1.12.*

tests:
  - script:
      - scx --help

about:
  homepage: https://github.com/btraven00/scx
  license: GPL-3.0-only
  license_file: LICENSE
  summary: "Single-cell streaming interop engine"
  description: |
    scx is a fast, streaming interop engine for single-cell data formats
    (H5Seurat, H5AD, BPCells, etc.), built in Rust.
