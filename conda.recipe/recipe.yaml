context:
  name: scx
  version: "0.1.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  git: https://github.com/btraven00/scx
  # tag: v${{ version }}
  branch: main

build:
  number: 1
  script:
    - if: unix
      then:
        - export HDF5_DIR="$PREFIX"
        - cargo install --path crates/scx-cli --root "$PREFIX" --locked
    - if: win
      then:
        - set "HDF5_DIR=%LIBRARY_PREFIX%"
        - cargo install --path crates/scx-cli --root "%PREFIX%" --locked

requirements:
  build:
    - ${{ compiler('rust') }}
    - if: unix
      then: pkg-config
  host:
    - hdf5 1.12.*
  run:
    - hdf5 1.12.*

tests:
  - script:
      - scx --help

about:
  homepage: https://github.com/btraven00/scx
  license: GPL-3.0-only
  license_file: LICENSE
  summary: "Single-cell streaming interop engine"
  description: |
    scx is a fast, streaming interop engine for single-cell data formats
    (H5Seurat, H5AD, BPCells, etc.), built in Rust.
